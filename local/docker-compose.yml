# strata — local development stack
#
# Services:
#   postgres  — Source DB + Iceberg JDBC catalog backend
#   spark     — PySpark runtime where ingestion runs
#   trino     — Athena substitute (queries Iceberg via JDBC catalog)
#   superset  — QuickSight substitute (connects to Trino)
#   api       — FastAPI backend for the UI module (../ui/api)
#   web       — Angular UI for browsing the data mart, embedding Superset
#               dashboards, and inserting new payments (../ui/web)
#
# Both Spark and Trino use the same JDBC catalog in PostgreSQL and the same
# warehouse directory, so tables created by Spark are immediately visible to
# Trino (and Superset).

services:
  postgres:
    image: postgres:15
    container_name: strata-postgres
    environment:
      POSTGRES_DB: data_mart
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata
    # Host port defaults to 5433 to avoid colliding with a local Postgres
    # install (Homebrew, Postgres.app, etc). Spark and Trino reach this
    # service via the Docker network at port 5432, so internal config is
    # unchanged. Override with: POSTGRES_HOST_PORT=15432 docker compose up
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d data_mart"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [strata]

  # Spark runtime — the ingestion code runs here.
  # The source mount lets you edit Python in your IDE and re-run without
  # rebuilding the image.
  #
  # We build a small custom image rather than depending on bitnami/spark
  # (whose tagging changed in late 2024) or apache/spark (whose Python
  # tag naming is inconsistent across versions). See local/spark/Dockerfile.
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: strata-spark:local
    container_name: strata-spark
    depends_on:
      postgres:
        condition: service_healthy
    user: root
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      STRATA_WAREHOUSE: file:///data/warehouse
      STRATA_JDBC_CATALOG_URI: "jdbc:postgresql://postgres:5432/data_mart"
      STRATA_JDBC_CATALOG_USER: strata
      STRATA_JDBC_CATALOG_PASSWORD: strata
      STRATA_SOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/data_mart"
    volumes:
      - ../src:/app/src:ro
      - ../local/config:/app/config:ro
      - ../local/secrets:/app/secrets:ro
      - ./data/warehouse:/data/warehouse
      - ./data/state:/data/state
    # Stay running so we can `exec` ingestion commands without cold-starting
    command: ["tail", "-f", "/dev/null"]
    networks: [strata]

  trino:
    image: trinodb/trino:438
    container_name: strata-trino
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TRINO_HOST_PORT:-8080}:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
      - ./data/warehouse:/data/warehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [strata]

  superset:
    image: apache/superset:3.1.0
    container_name: strata-superset
    depends_on:
      - trino
    ports:
      - "${SUPERSET_HOST_PORT:-8088}:8088"
    environment:
      SUPERSET_SECRET_KEY: local-dev-not-for-production-please-change
      SUPERSET_LOAD_EXAMPLES: "no"
      # Point Superset at the bind-mounted superset_config.py below.
      # This is what allows the Angular UI to embed dashboards in an iframe
      # (Talisman/X-Frame-Options/CSP relaxed for localhost).
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    volumes:
      - superset-data:/app/superset_home
      - ./superset/superset_init.sh:/app/superset_init.sh:ro
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: ["/app/superset_init.sh"]
    networks: [strata]

  # Spring Boot backend for the UI module.
  # Tables, payments, and the A2UI payment wizard.
  api:
    build:
      context: ../ui/api
      dockerfile: Dockerfile
    image: strata-api:local
    container_name: strata-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: data_mart
      PGUSER: strata
      PGPASSWORD: strata
      PGSCHEMA: data_mart
      SUPERSET_INTERNAL_URL: "http://superset:8088"
      # PUBLIC URL is what the browser uses to load the dashboards in
      # iframes. We route it through the Angular nginx (port 4200) so
      # everything is same-origin — cookies + CSRF work uniformly. The
      # nginx config has a regex location that proxies /superset/,
      # /dashboard/, /chart/, /static/, /login/, etc. to the Superset
      # container.
      SUPERSET_PUBLIC_URL: "http://localhost:${UI_HOST_PORT:-4200}"
      SUPERSET_USER: admin
      SUPERSET_PASSWORD: admin
      CORS_ORIGINS: "http://localhost:${UI_HOST_PORT:-4200}"
      # AI payment wizard — Qwen via Ollama on the host. Override
      # OLLAMA_URL if Ollama is somewhere else; on Linux you may need
      #   OLLAMA_URL=http://172.17.0.1:11434
      # (the docker0 bridge IP) instead of host.docker.internal.
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
    # `extra_hosts` makes host.docker.internal resolve on Linux too
    # (it's only auto-defined on Docker Desktop for Mac/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/health',timeout=2); sys.exit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [strata]

  # Angular UI — built by Node, served via nginx, which also reverse-proxies
  # /api to the FastAPI container so the browser hits one origin only.
  web:
    build:
      context: ../ui/web
      dockerfile: Dockerfile
    image: strata-web:local
    container_name: strata-web
    depends_on:
      - api
    ports:
      - "${UI_HOST_PORT:-4200}:80"
    networks: [strata]

networks:
  strata:
    name: strata-network

volumes:
  postgres-data:
  superset-data:
