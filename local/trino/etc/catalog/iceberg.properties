# Iceberg connector with JDBC catalog backed by PostgreSQL.
# Both Spark and Trino share this catalog so tables created by Spark are
# immediately visible to Trino without any sync step.

connector.name=iceberg
iceberg.catalog.type=jdbc

iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/data_mart
iceberg.jdbc-catalog.connection-user=strata
iceberg.jdbc-catalog.connection-password=strata
iceberg.jdbc-catalog.catalog-name=iceberg
iceberg.jdbc-catalog.default-warehouse-dir=file:///data/warehouse
