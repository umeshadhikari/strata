server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS — when we use a variable in `proxy_pass`, nginx
  # defers hostname resolution to REQUEST TIME (not startup time). That way,
  # if optional services like superset aren't running, nginx still boots
  # and the wizard works — only requests to /superset/* return 502.
  # Without this, a missing upstream is "host not found in upstream" at
  # boot and the container crash-loops.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Proxy Superset's top-level paths through nginx so iframes embed
  # same-origin (and the session cookie actually flows).
  #
  # Why this exists: when Angular runs on :4200 and Superset on :8088,
  # the iframe is cross-site. Chrome won't send the Superset session
  # cookie to a cross-site iframe over HTTP unless it's both
  # SameSite=None *and* Secure — which isn't possible on plain HTTP.
  # Proxying through this nginx makes Superset appear to live at
  # http://localhost:4200/superset/... (same origin), so the cookie
  # is first-party and the embedded editor works.
  #
  # NOTE: this regex MUST come before the /api/ prefix location so
  # /api/v1/ (Superset) wins over /api/ (our FastAPI). nginx orders
  # regex locations ahead of prefix locations regardless of file order,
  # but we keep them logically grouped here.
  location ~ ^/(superset|dashboard|chart|login|logout|static|sqllab|datasource|savedqueryview|tabstateview|tablemodelview|databaseview|datasetview|csstemplatemodelview|annotationmodelview|annotationlayer|roles|users|usermodelview|swagger|users/list|csrf_token|me)(/|$) {
    set                $superset_upstream http://superset:8088;
    proxy_pass         $superset_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host $http_host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $http_host;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_read_timeout 90s;
  }

  # Superset's REST API (/api/v1/) — regex wins over the /api/ prefix
  # below so this path goes to Superset, not our FastAPI.
  location ~ ^/api/v1/ {
    set                $superset_api_upstream http://superset:8088;
    proxy_pass         $superset_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host $http_host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $http_host;
  }

  # Our Spring Boot backend (/api/* except /api/v1/* which is matched above).
  # Deferred resolution here too — if the api container restarts, nginx
  # picks up the new IP next request instead of holding a stale one.
  #
  # Generous read timeout because the wizard's POST /api/wizard/turn calls
  # Ollama, and CPU inference for gpt-oss:20b / llama3.1:8b can take 60-180s
  # — especially the FIRST request that has to load the model into RAM.
  location /api/ {
    set                $api_upstream http://api:8000;
    proxy_pass         $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host $http_host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $http_host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
  }

  # SPA fallback — any other path serves index.html so Angular's
  # router handles deep links like /tables/fact_pay_payment.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
