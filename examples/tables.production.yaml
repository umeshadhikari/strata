# Production-shape strata config for the 15-table data mart described in
# examples/sample_datamart.ddl.sql. Drop this in as
# `local/config/tables.local.yaml` after wiping the stack to repopulate
# the warehouse with the new schema.
#
# Domains, watermark columns, and partition specs are pre-resolved with
# sensible defaults. Tune them as you learn more about your query
# patterns and row volumes.

defaults:
  source_schema: data_mart
  write_mode: append
  fetch_size: 5000
  glue_database_prefix: silver_

tables:

  # ----- shared conformed dimensions ----- #

  DIM_ACCOUNT:
    source_table: dim_account
    domain: shared
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec: []

  DIM_DATE:
    source_table: dim_date
    domain: shared
    # Static reference table populated by DDL DO block — `id` advances
    # monotonically on each insert and is fine as a watermark.
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  DIM_CURRENCY:
    source_table: dim_currency
    domain: shared
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec: []

  DIM_DATA_OWNER:
    source_table: dim_data_owner
    domain: shared
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec: []

  DIM_USER:
    source_table: dim_user
    domain: shared
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec: []

  DIM_CLASSIFICATION:
    source_table: dim_classification
    domain: shared
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec: []

  DIM_ROUTING:
    source_table: dim_routing
    domain: shared
    # Routing is reference data with no timestamp; id-as-watermark.
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  # ----- balances (account-statement) domain ----- #

  DIM_AS_CHARACTERISTICS:
    source_table: dim_as_characteristics
    domain: balances
    # Static lookup of balance/transaction flags; id-as-watermark.
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  DIM_AS_TRANSACTION_TYPE:
    source_table: dim_as_transaction_type
    domain: balances
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  FACT_AS_BALANCE:
    source_table: fact_as_balance
    domain: balances
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec:
      - { transform: days, column: fx_rate_date }
      # For >100M rows/year add the bucket transform on data_owner_id:
      # - { transform: bucket, column: data_owner_id, n: 16 }

  FACT_AS_TRANSACTION:
    source_table: fact_as_transaction
    domain: balances
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec:
      - { transform: days, column: fx_rate_date }

  FACT_AS_CURRENCY_EXCHANGE:
    source_table: fact_as_currency_exchange
    domain: balances
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec:
      - { transform: days, column: last_updated_time }

  # ----- payments domain ----- #

  DIM_PAY_CHARACTERISTICS:
    source_table: dim_pay_characteristics
    domain: payments
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  DIM_PAY_BANK_STATUS:
    source_table: dim_pay_bank_status
    domain: payments
    watermark_column: id
    primary_key: [id]
    partition_spec: []

  FACT_PAY_PAYMENT:
    source_table: fact_pay_payment
    domain: payments
    watermark_column: last_updated_time
    primary_key: [id]
    partition_spec:
      - { transform: days, column: creation_date }
      # For >100M rows/year add: - { transform: bucket, column: data_owner_id, n: 16 }
